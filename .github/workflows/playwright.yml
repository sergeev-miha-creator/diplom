name: playwright tests

permissions:
  contents: write
  pages: write
  actions: read

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  e2eTests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          
      - name: Установка пакетов
        run: npm i
        
      - name: Устанавливаем браузеры
        run: npx playwright install --with-deps
        
      - name: Запускаем тесты
        run: npm t
        
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results
          retention-days: 20
          
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results
          retention-days: 20
      
      # Установка Allure CLI
      - name: Install Allure CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y allure
          
      # Генерация HTML отчета из результатов
      - name: Generate Allure Report
        if: always()
        run: |
          allure generate allure-results --clean -o allure-report
          
      # Сохраняем отчет как артефакт (для отладки)
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report
          retention-days: 20
          
      # Подготавливаем историю для графиков (опционально)
      - name: Checkout gh-pages for history
        if: always()
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-history
          
      # Копируем историю из прошлых отчетов (для трендов)
      - name: Copy history from previous report
        if: always()
        run: |
          if [ -d "gh-pages-history/history" ]; then
            cp -r gh-pages-history/history allure-report/history/ || true
          fi
          
      # Генерируем финальный отчет с историей
      - name: Generate Final Report with History
        if: always()
        run: |
          allure generate allure-results --clean -o allure-report
          
      # Деплоим отчет на GitHub Pages
      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
          force_orphan: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy Allure Report for run #${{ github.run_number }}'
          
      # Установка allurectl для TestOps
      - name: Install allurectl
        run: |
          curl -o allurectl -L "https://github.com/allure-framework/allurectl/releases/latest/download/allurectl_linux_amd64"
          chmod +x allurectl
          sudo mv allurectl /usr/local/bin/
          
      # Загрузка в TestOps
      - name: Upload results to Allure TestOps
        if: always()
        run: |
          allurectl upload allure-results \
            --endpoint https://allure.autotests.cloud \
            --project-id 5225 \
            --token ${{ secrets.ALLURE_TOKEN }} \
            --launch-name "GitHub Run #${{ github.run_number }}"
          
      # Парсим статистику из отчета
      - name: Parse Allure summary
        id: parse_summary
        if: always()
        run: |
          SUMMARY_FILE="allure-report/widgets/summary.json"
          if [ -f "$SUMMARY_FILE" ]; then
            PASSED=$(jq '.statistic.passed' $SUMMARY_FILE)
            FAILED=$(jq '.statistic.failed' $SUMMARY_FILE)
            SKIPPED=$(jq '.statistic.skipped' $SUMMARY_FILE)
            TOTAL=$(jq '.statistic.total' $SUMMARY_FILE)
            echo "PASSED=$PASSED" >> $GITHUB_ENV
            echo "FAILED=$FAILED" >> $GITHUB_ENV
            echo "SKIPPED=$SKIPPED" >> $GITHUB_ENV
            echo "TOTAL=$TOTAL" >> $GITHUB_ENV
          else
            echo "PASSED=0" >> $GITHUB_ENV
            echo "FAILED=0" >> $GITHUB_ENV
            echo "SKIPPED=0" >> $GITHUB_ENV
            echo "TOTAL=0" >> $GITHUB_ENV
          fi
          
      # Отправка уведомления в Telegram
      - name: Notify Telegram
        if: always()
        run: |
          STATUS=${{ job.status }}
          if [ "$STATUS" = "success" ]; then
            EMOJI="✅"
            STATUS_TEXT="УСПЕШНО"
          else
            EMOJI="❌"
            STATUS_TEXT="ПРОВАЛ"
          fi
          
          # Добавляем эмодзи в зависимости от процента успеха
          if [ "$TOTAL" -gt 0 ]; then
            PASS_RATE=$((PASSED * 100 / TOTAL))
            if [ "$PASS_RATE" -eq 100 ]; then
              GRADE_ICON="🟢"
            elif [ "$PASS_RATE" -ge 80 ]; then
              GRADE_ICON="🟡"
            else
              GRADE_ICON="🔴"
            fi
          else
            GRADE_ICON="⚪"
          fi

          MESSAGE="$GRADE_ICON $EMOJI *$STATUS_TEXT* $EMOJI%0A\
          ━━━━━━━━━━━━━━━━━%0A\
          📊 *Статистика тестов:*%0A\
          ▫️ Всего: *${TOTAL:-0}*%0A\
          ✅ Успешно: *${PASSED:-0}*%0A\
          ❌ Провалено: *${FAILED:-0}*%0A\
          ⏭️ Пропущено: *${SKIPPED:-0}*%0A\
          ━━━━━━━━━━━━━━━━━%0A\
          🔗 [Allure отчет](https://sergeev-miha-creator.github.io/diplom/)%0A\
          🧪 [Allure TestOps](https://allure.autotests.cloud/project/5225)%0A\
          📦 [Артефакты](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})%0A\
          ━━━━━━━━━━━━━━━━━%0A\
          🏷️ *Run #${{ github.run_number }}*"

          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d parse_mode=Markdown \
          -d text="$MESSAGE"